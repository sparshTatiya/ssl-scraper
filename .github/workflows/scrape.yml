name: Scrape SSL Opportunities

on:
  schedule:
    # FULL scrape: 6 AM ET weekdays only (11:00 UTC, Mon-Fri)
    - cron: '0 11 * * 1-5'
    # QUICK check: every 30 min from 9 AM to 9 PM ET (14:00 - 01:59 UTC)
    - cron: '*/30 14-23 * * *'
    - cron: '*/30 0-1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Determine scrape mode
        id: mode
        run: |
          # Manual trigger uses input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          # Push triggers full scrape
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          # Schedule: check the hour (UTC)
          else
            HOUR=$(date -u +%H)
            # 11:00 UTC = 6 AM ET = full scrape time
            if [ "$HOUR" = "11" ] && [ "$(date -u +%M)" -lt "5" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=quick" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Selected mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Run scraper
        run: python scraper.py ${{ steps.mode.outputs.mode }}

      - name: Commit and push results
        run: |
          git config user.name "SSL Scraper Bot"
          git config user.email "bot@ssl-finder.local"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            if [ "$MODE" = "quick" ]; then
              git commit -m "🆕 New opportunities found - $(date -u '+%Y-%m-%d %H:%M UTC')"
            else
              git commit -m "🔄 Full scrape - $(date -u '+%Y-%m-%d %H:%M UTC')"
            fi
            git pull --rebase origin main
            git push
          fi
