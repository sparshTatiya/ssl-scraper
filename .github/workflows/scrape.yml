name: Scrape SSL Opportunities

on:
  schedule:
    # Every 5 minutes from 9 AM to 9 PM ET (1 PM to 1 AM UTC)
    - cron: '*/5 13-23 * * *'  # 9 AM - 7 PM ET
    - cron: '*/5 0-1 * * *'    # 7 PM - 9 PM ET
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "SSL Scraper Bot"
          git config user.email "bot@ssl-finder.local"
          git add docs/
          git diff --cached --quiet || git commit -m "Update opportunities - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
